<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarePlus Medicines</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#eaf3ff,#f9fbff);
    padding-top:80px;
}

/* NAVBAR */
.navbar{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(10px);
    box-shadow:0 5px 25px rgba(0,0,0,0.08);
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}
.hero h1{
    font-size:45px;
    font-weight:600;
    background:linear-gradient(to right,#0d6efd,#20c997);
    -webkit-background-clip:text;
    color:transparent;
}

/* CATEGORY */
.categories{
    text-align:center;
    margin-bottom:30px;
}
.categories button{
    margin:8px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#0d6efd;
    color:white;
    transition:0.3s;
}
.categories button:hover{
    background:#084298;
}
.active{
    background:#20c997 !important;
}

/* GRID */
.medicine-box{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px 60px;
}

/* CARD */
.card{
    background:white;
    border-radius:20px;
    padding:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    transition:0.4s;
    opacity:0;
    transform:translateY(30px);
}
.card.show{
    opacity:1;
    transform:translateY(0);
}
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 20px 50px rgba(13,110,253,0.2);
}
.card img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:15px;
}
.name{
    font-weight:600;
    margin-top:10px;
}
.desc{
    color:#666;
    font-size:14px;
}

/* CTA */
.cta{
    margin:60px;
    padding:40px;
    background:linear-gradient(to right,#0d6efd,#20c997);
    color:white;
    border-radius:20px;
    text-align:center;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="index.html">CarePlus</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="about.html">About</a></li>
        <li><a class="nav-link" href="services.html">Services</a></li>
        <li><a class="nav-link" href="contact.html">Contact</a></li>
        <li><a class="nav-link active" href="#">Medicines</a></li>
        <li><a class="nav-link" href="equipments.html">Equipments</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
<h1>Medicines</h1>
<p>All medicines available at discounted prices 💊</p>
</div>

<!-- CATEGORY -->
<div class="categories">
<button onclick="showCategory('tablets')" class="active">Tablets</button>
<button onclick="showCategory('syrups')">Syrups</button>
<button onclick="showCategory('injections')">Injections</button>
<button onclick="showCategory('others')">Others</button>
</div>

<!-- DISPLAY -->
<div class="medicine-box" id="medicineBox"></div>

<!-- CTA -->
<div class="cta">
<h3>Need Medicines?</h3>
<p>Get medicines at best discount price with home delivery</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const img="https://images.unsplash.com/photo-1587854692152-cbe660dbde88";

/* DATA */
const data={
tablets:[
{name:"Dolo 650",desc:"Fever & Pain Relief",img:img},
{name:"Augmentin 625",desc:"Powerful Antibiotic",img:img},
{name:"Crocin Advance",desc:"Pain Relief",img:img},
{name:"Zincovit",desc:"Multivitamin",img:img}
],
syrups:[
{name:"Benadryl",desc:"Cough Syrup",img:img},
{name:"Ascoril LS",desc:"Cold & Cough",img:img}
],
injections:[
{name:"Insulin",desc:"Diabetes Control",img:img},
{name:"Voveran",desc:"Pain Injection",img:img}
],
others:[
{name:"Ensure Powder",desc:"Nutrition Supplement",img:img},
{name:"ORS",desc:"Hydration",img:img}
]
};

/* FUNCTION */
function showCategory(category){
let box=document.getElementById("medicineBox");
box.innerHTML="";

data[category].forEach((med,i)=>{
box.innerHTML+=`
<div class="card">
<img src="${med.img}">
<div class="name">${med.name}</div>
<div class="desc">${med.desc}</div>
</div>`;
});

/* animation */
setTimeout(()=>{
document.querySelectorAll(".card").forEach((c,i)=>{
setTimeout(()=>c.classList.add("show"),i*100);
});
},100);

document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

showCategory('tablets');
</script>

</body>
</html>
